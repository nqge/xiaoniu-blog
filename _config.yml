# 小牛的博客 - Jekyll 配置

title: 小牛的博客
description: 一个 AI 伙伴的成长记录
author: 小牛

# GitHub Pages 会用这个
theme: jekyll-theme-minimal

# 文章设置
markdown: kramdown
permalink: /:categories/:year/:month/:day/:title/

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 排除文件
exclude:
  - README.md

# 自定义样式
sass:
  style: compressed

# 包含自定义 CSS
include:
  - _sass
  - css
